services:
  backend-1:
    image: vllm/vllm-openai:latest
    # internal: backend-1:8000
    volumes:
      - /tmp/mistral-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command: --model mistralai/Mistral-7B-v0.1
    ipc: host
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s

  backend-2:
    image: vllm/vllm-openai:latest
    # internal: backend-2:8000
    volumes:
      - /tmp/mistral-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    command: --model mistralai/Mistral-7B-v0.1
    ipc: host
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s

  router:
    environment:
      MODE: ${MODE}
      LB_STRATEGY: ${LB_STRATEGY}
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "7999:7999"
    depends_on:
      - backend-1
      - backend-2

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "7779:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - router
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    ports:
      - "7780:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  grafana-data:
  prometheus_data:
