services:
  backend-1:
    image: vllm/vllm-openai:latest
    ports:
      - "7777:8000"
    volumes:
      - /tmp/mistral-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: --model mistralai/Mistral-7B-v0.1
    ipc: host

  backend-2:
    image: vllm/vllm-openai:latest
    ports:
      - "7778:8000"
    volumes:
      - /tmp/mistral-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    command: --model mistralai/Mistral-7B-v0.1
    ipc: host

  router:
    environment:
      MODE: ${MODE}
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "7999:7999"
    depends_on:
      - backend-1
      - backend-2

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "7779:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "7780:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data: