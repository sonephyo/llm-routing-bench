# Use for development of routing systems without requiring gpu servers

services:
  backend-1:
    build:
      context: .
      dockerfile: router/dev/fakeserver/Dockerfile
    container_name: fakeserver-container1
    ports:
      - "7777:8000"

  backend-2:
    build:
      context: .
      dockerfile: router/dev/fakeserver/Dockerfile
    container_name: fakeserver-container2
    ports:
      - "7778:8000"

  router:
    environment:
      MODE: ${MODE}
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "7999:7999"
    depends_on:
      - backend-1
      - backend-2

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "7998:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./router/dev/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - router
