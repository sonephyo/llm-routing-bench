# Use for development of routing systems without requiring gpu servers

services:
  backend-1:
    build:
      context: .
      dockerfile: router/dev/fakeserver/Dockerfile
    container_name: fakeserver-container1
    ports:
      - "7777:8000"

  backend-2:
    build:
      context: .
      dockerfile: router/dev/fakeserver/Dockerfile
    container_name: fakeserver-container2
    ports:
      - "7778:8000"

  router:
    environment:
      MODE: ${MODE}
      LB_STRATEGY: ${LB_STRATEGY}
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "7999:7999"
    depends_on:
      - backend-1
      - backend-2

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "7998:9090"
    volumes:
      - ./router/dev/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - router
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    ports:
      - "8000:3000"
    volumes:
      - ./router/dev/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./router/dev/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy 

volumes:
  grafana-data:
  prometheus_data: