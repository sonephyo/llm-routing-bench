global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'vllm-backend-1'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:7777']
        labels:
          backend: 'gpu-0'

  - job_name: 'vllm-backend-2'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:7778']
        labels:
          backend: 'gpu-1'